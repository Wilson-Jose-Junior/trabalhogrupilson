<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎮 Pegue o Quadrado</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Segoe UI',sans-serif;
    background:linear-gradient(135deg,#0f172a,#1e293b);
    color:white;
    text-align:center;
    min-height:100vh;
}

h1{
    margin-top:20px;
    font-size:3rem;
}

.info{
    display:flex;
    justify-content:center;
    gap:30px;
    margin:20px 0;
    font-size:1.3rem;
    flex-wrap:wrap;
}

#game{
    width:90vw;
    max-width:1000px;
    height:70vh;
    margin:0 auto 20px;
    position:relative;
    overflow:hidden;
    border-radius:20px;
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(10px);
    border:1px solid rgba(255,255,255,0.1);
    box-shadow:0 0 30px rgba(0,0,0,0.4);
}

#target{
    width:60px;
    height:60px;
    position:absolute;
    border-radius:15px;
    cursor:pointer;
    background:linear-gradient(135deg,#22c55e,#16a34a);
    box-shadow:
        0 0 20px #22c55e,
        0 0 40px rgba(34,197,94,.5);
    transition:transform .1s;
}

#target:hover{
    transform:scale(1.1);
}

#target:active{
    transform:scale(0.9);
}

button{
    padding:12px 25px;
    border:none;
    border-radius:30px;
    background:#3b82f6;
    color:white;
    font-size:16px;
    cursor:pointer;
    margin-bottom:20px;
}

button:hover{
    opacity:0.9;
}

#message{
    font-size:1.5rem;
    margin-bottom:20px;
}
</style>
</head>
<body>

<h1>🎮 Pegue o Quadrado</h1>

<div class="info">
    <div id="score">Pontos: 0</div>
    <div id="timer">Tempo: 30</div>
    <div id="record">Recorde: 0</div>
</div>

<div id="game">
    <div id="target"></div>
</div>

<button onclick="restartGame()">🔄 Reiniciar</button>

<div id="message"></div>

<script>
const target = document.getElementById("target");
const game = document.getElementById("game");

const scoreText = document.getElementById("score");
const timerText = document.getElementById("timer");
const recordText = document.getElementById("record");
const messageText = document.getElementById("message");

let score = 0;
let record = 0;
let timeLeft = 30;
let gameRunning = true;

function moveTarget(){
    const maxX = game.clientWidth - target.offsetWidth;
    const maxY = game.clientHeight - target.offsetHeight;

    const x = Math.random() * maxX;
    const y = Math.random() * maxY;

    target.style.left = x + "px";
    target.style.top = y + "px";
}

target.addEventListener("click", () => {
    if(!gameRunning) return;

    score++;

    if(score > record){
        record = score;
    }

    scoreText.textContent = "Pontos: " + score;
    recordText.textContent = "Recorde: " + record;

    moveTarget();
});

function endGame(){
    gameRunning = false;
    target.style.display = "none";

    messageText.innerHTML =
        `🏆 Fim de jogo! Você fez <b>${score}</b> pontos.`;
}

function restartGame(){
    score = 0;
    timeLeft = 30;
    gameRunning = true;

    scoreText.textContent = "Pontos: 0";
    timerText.textContent = "Tempo: 30";
    messageText.textContent = "";

    target.style.display = "block";

    moveTarget();
}

setInterval(() => {
    if(!gameRunning) return;

    timeLeft--;

    timerText.textContent = "Tempo: " + timeLeft;

    if(timeLeft <= 0){
        endGame();
    }
}, 1000);

setInterval(() => {
    if(gameRunning){
        moveTarget();
    }
}, 800);

moveTarget();
</script>

</body>
</html>
